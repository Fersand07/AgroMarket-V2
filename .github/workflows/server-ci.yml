name: Server CI

on:
  push:
    branches:
      - develop
      - main
    paths:
      - "AGRO_SERVER/**"
  pull_request:
    branches:
      - develop
      - main
    paths:
      - "AGRO_SERVER/**"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: AGRO_SERVER

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: AGRO_SERVER/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: AGRO_SERVER

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: AGRO_SERVER/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: node node_modules/prisma/build/index.js generate
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"

      - name: Run tests
        run: npm test

  security:
    name: Security audit
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: AGRO_SERVER

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: AGRO_SERVER/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high
